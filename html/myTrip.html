<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="../css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
</head>
<body>
    <div class="container">
    <header>
        <h1>🌍 나의 여행 앨범 🎵</h1>
        <p>사진과 음악, 영상으로 기억하는 나의 여행지입니다.</p>
    </header>

    <main>
        <section>
            <h2>🎧 여행 음악</h2>
            <audio controls>
                <source src="../media/music.mp3" type="audio/mpeg">
                브라우저가 오디오 재생을 지원하지 않습니다.
            </audio>
        </section>

        <hr>

        <section>
            <h2>📷 여행 사진</h2>

            <!-- 미션 4: 세 개의 카드를 CSS Grid로 묶어 3열로 배치한다. -->
            <div class="trip-grid">
            <p class="trip-card">
                <img src="../media/disneysea.jpeg" alt="디즈니씨의 아름다운 풍경" width="600"><br>
                <strong>디즈니씨 - 토이스토리 어트랙션</strong>
            </p>

            <p class="trip-card">
                <img src="../media/asakusa.jpg" alt="아사쿠사 센소지에서 바라본 풍경" width="600"><br>
                <strong>아사쿠사 센소지</strong>
            </p>

            <p class="trip-card">
                <img src="../media/tokyo-station.jpeg" alt="도쿄역의 인상적인 풍경" width="600"><br>
                <strong>도쿄역의 야경</strong>
            </p>
            </div>
        </section>

        <hr>

        <section>
            <h2>🎥 나의 여행 브이로그</h2>
            <video controls width="600">
                <source src="../media/video.mp4" type="video/mp4">
                브라우저가 비디오 재생을 지원하지 않습니다.
            </video>
            <p>일본 아사쿠사 한바퀴</p>
        </section>
    </main>

    <p><a href="index.html">🏠 메인 Hub로 돌아가기</a></p>
    </div>
</body>
</html>
