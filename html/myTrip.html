<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
</head>
<body>
    <header>
        <h1>🌍 나의 여행 앨범 🎵</h1>
        <p>사진과 음악, 영상으로 기억하는 나의 여행지입니다.</p>
    </header>

    <main>
        <section>
            <h2>🎧 여행 음악</h2>
            <audio controls>
                <!-- 아래 파일명을 실제 오디오 파일명으로 변경하세요. -->
                <source src="../media/music.mp3" type="audio/mpeg">
                브라우저가 오디오 재생을 지원하지 않습니다.
            </audio>
        </section>

        <hr>

        <section>
            <h2>📷 여행 사진</h2>

            <figure>
                <!-- 아래 파일명을 실제 이미지 파일명으로 변경하세요. -->
                <img src="../media/disneysea.jpeg" alt="디즈니씨의 아름다운 풍경" width="600">
                <figcaption>첫 번째 여행지의 추억</figcaption>
            </figure>

            <figure>
                <img src="../media/asakusa.jpg" alt="아사쿠사 센소지에서 바라본 풍경" width="600">
                <figcaption>두 번째 여행지의 추억</figcaption>
            </figure>

            <figure>
                <img src="../media/tokyo-station.jpeg" alt="도쿄역의 인상적인 풍경" width="600">
                <figcaption>세 번째 여행지의 추억</figcaption>
            </figure>
        </section>

        <hr>

        <section>
            <h2>🎥 나의 여행 브이로그</h2>
            <video controls width="600">
                <!-- 아래 파일명을 실제 비디오 파일명으로 변경하세요. -->
                <source src="../media/video.mp4" type="video/mp4">
                브라우저가 비디오 재생을 지원하지 않습니다.
            </video>
            <p>여행지에서 기록한 소중한 순간들</p>
        </section>
    </main>

    <p><a href="index.html">🏠 메인 Hub로 돌아가기</a></p>
</body>
</html>
