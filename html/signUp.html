<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA-FRONT 회원가입</title>
</head>
<body>
    <h2>👤 회원가입</h2>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <form action="signUpResult.html" method="get">
        <fieldset>
            <legend>계정 정보</legend>

            <p>
                <label for="userId">아이디:</label>
                <input
                    type="text"
                    id="userId"
                    name="userId"
                    minlength="4"
                    maxlength="15"
                    pattern="[A-Za-z0-9]+"
                    placeholder="4~15자 영문/숫자"
                    required
                >
                <small>(필수)</small>
            </p>

            <p>
                <label for="password">비밀번호:</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    minlength="8"
                    placeholder="8자 이상 입력"
                    required
                >
                <small>(필수)</small>
            </p>

            <p>
                <label for="emailId">이메일:</label>
                <input
                    type="text"
                    id="emailId"
                    name="emailId"
                    placeholder="example"
                    required
                >
                @
                <label for="emailDomain">이메일 도메인</label>
                <select id="emailDomain" name="emailDomain" required>
                    <option value="">직접 선택</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="naver.com">naver.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="kakao.com">kakao.com</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>

            <p>
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </p>

            <p>
                <label for="birthDate">생년월일:</label>
                <input type="date" id="birthDate" name="birthDate" required>
            </p>

            <p>
                <span>성별:</span>
                <input type="radio" id="genderMale" name="gender" value="남성">
                <label for="genderMale">남성</label>

                <input type="radio" id="genderFemale" name="gender" value="여성">
                <label for="genderFemale">여성</label>

                <input type="radio" id="genderNone" name="gender" value="선택안함" checked>
                <label for="genderNone">선택안함</label>
            </p>

            <p>관심 분야 (중복 선택 가능):</p>
            <p>
                <input type="checkbox" id="interestFrontend" name="interest" value="웹 프론트엔드">
                <label for="interestFrontend">웹 프론트엔드 (Vue.js/HTML)</label><br>

                <input type="checkbox" id="interestUiUx" name="interest" value="UI/UX 디자인">
                <label for="interestUiUx">UI/UX 디자인 표준</label><br>

                <input type="checkbox" id="interestBackend" name="interest" value="백엔드 및 데이터베이스">
                <label for="interestBackend">백엔드 &amp; 데이터베이스</label><br>

                <input type="checkbox" id="interestCloud" name="interest" value="클라우드 및 인프라">
                <label for="interestCloud">클라우드 &amp; 인프라</label>
            </p>

            <p>
                <label for="joinPath">가입 경로:</label>
                <select id="joinPath" name="joinPath" required>
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="검색">인터넷 검색</option>
                    <option value="지인추천">지인 추천</option>
                    <option value="SNS">SNS</option>
                    <option value="기타">기타</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="introduction">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea
                    id="introduction"
                    name="introduction"
                    rows="6"
                    cols="50"
                    maxlength="200"
                    placeholder="여기에 내용을 입력하세요 (최대 200자)"
                ></textarea>
            </p>
        </fieldset>

        <p>
            <input type="submit" value="동의하고 회원가입">
            <input type="reset" value="다시 작성">
        </p>
    </form>
</body>
</html>
